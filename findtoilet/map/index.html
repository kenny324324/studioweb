    <style>
        :root {

        .filter-bar {

            padding: 0 12px 8px;
            display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;

            will-change: transform;

            width: 36px; height: 4px; background: rgba(0,0,0,0.2); border-radius: 2px;
        }

        .sheet-header-btn .mi { font-size: 16px; }

        /* Search bar */
        .sheet-search { padding: 0 16px 10px; flex-shrink: 0; }

        .search-wrapper input {

            font-size: 0.88rem; color: var(--text); outline: none; font-family: inherit;

        .search-wrapper input::placeholder { color: var(--text-tertiary); }
        .search-clear {
            background: none; border: none; font-size: 1rem; color: var(--text-tertiary);
            cursor: pointer; padding: 2px; line-height: 1; display: none;
        }

        .sheet-scroll {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 0 16px 16px; overscroll-behavior: contain;
        }
        .sheet-list { background: rgba(0,0,0,0.03); border-radius: var(--radius); overflow: hidden; }

        /* ===== List Item ===== */
        .list-item {
            display: flex; align-items: center; padding: 14px 16px; gap: 14px;
            cursor: pointer; transition: background 0.15s;
        }
        .list-item:active { background: rgba(0,0,0,0.04); }
        .list-item + .list-item { border-top: 0.5px solid var(--separator); }
        .list-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 1.1rem;
        }
        .list-content { flex: 1; min-width: 0; }
        .list-name {
            font-size: 0.92rem; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .list-stars { display: flex; gap: 4px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
        .star-badge {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            background: rgba(255,214,10,0.18); color: #B8860B;
            font-size: 0.68rem; font-weight: 600; white-space: nowrap;
        }
        .list-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .distance-badge { font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
        .dist-green { color: #1B7A4A; background: rgba(52,199,89,0.15); }

        .dist-red { color: #C4302B; background: rgba(255,59,48,0.15); }

        .list-chevron { font-size: 18px !important; }

        /* ===== Detail Sheet ===== */
        .detail-sheet {
            position: fixed; left: 0; right: 0; bottom: 0; z-index: 950;
            background: var(--card-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 16px 16px 0 0; box-shadow: 0 -8px 32px rgba(0,0,0,0.15);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            height: 100dvh; display: flex; flex-direction: column;
            padding-bottom: var(--safe-bottom);
        }

        .detail-header { padding: 16px 20px 0; }
        .detail-back {
            display: flex; align-items: center; gap: 4px;
            background: none; border: none; color: var(--blue);

            padding: 0; margin-bottom: 12px; font-family: inherit;

        .detail-back .mi { font-size: 16px; }
        .detail-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }

        .detail-stars { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
        .star-badge-lg {
            display: inline-block; padding: 2px 10px; border-radius: 6px;
            background: rgba(255,214,10,0.18); color: #B8860B;
            font-size: 0.8rem; font-weight: 600; white-space: nowrap;

        .detail-badge {
            display: inline-flex; align-items: center; gap: 2px;
            padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; margin-left: 6px;

        .badge-fl { color: var(--orange); background: rgba(250,158,71,0.12); }

        .detail-nav-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--blue); color: #fff; border: none; border-radius: 50px;
            padding: 10px 18px; font-size: 0.88rem; font-weight: 600;

        .detail-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }

        /* Floor selector */
        .floor-section { margin-bottom: 16px; }

        }
        .floor-tab.active { background: var(--blue); color: #fff; }

        /* Toilet type tags */
        .type-section { margin-bottom: 16px; }
        .type-label { font-size: 0.78rem; font-weight: 600; color: var(--text-tertiary); margin-bottom: 8px; }

        /* Info grid */
        .info-grid { background: rgba(0,0,0,0.03); border-radius: var(--radius); overflow: hidden; }
        .info-row { display: flex; padding: 12px 16px; gap: 12px; }
        .info-row + .info-row { border-top: 0.5px solid var(--separator); }
        .info-label { font-size: 0.82rem; color: var(--text-tertiary); width: 70px; flex-shrink: 0; font-weight: 500; }
        .info-value { font-size: 0.82rem; color: var(--text); font-weight: 500; flex: 1; }

        /* ===== Review Section (locked) ===== */
        .review-section { margin-top: 16px; position: relative; }
        .review-section-header {
            font-size: 0.78rem; font-weight: 600; color: var(--text-tertiary); margin-bottom: 8px;
        }
        .review-placeholder-wrap {
            background: rgba(0,0,0,0.03); border-radius: var(--radius);
            overflow: hidden; position: relative;
        }
        .review-placeholder-items { filter: blur(4px); user-select: none; pointer-events: none; }

            display: flex; gap: 10px; padding: 12px 16px; align-items: flex-start;

        .loading-text { font-size: 0.85rem; color: var(--text-tertiary); }

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
    <script>
    (function() {
        'use strict';

        // ===== Config =====
        const TAIWAN = [23.7, 120.96];
        const ZOOM_DEFAULT = 8;
        const ZOOM_LOCATED = 15;
        const MAX_MARKERS = 150;

        const GRADE_MAP = { 1: '特優級', 2: '優等級', 3: '普通級', 4: '不合格' };
        // Fix #1: Match app's 3-star system (HomeSheetView.swift:567-587)
        const GRADE_STARS = { 1: 3, 2: 2, 3: 1, 4: 1, 0: 1 };
        const FACILITY = { 1: '女廁所', 2: '男廁所', 4: '無障礙廁所', 8: '親子廁所', 16: '性別友善廁所', 32: '尿布台' };
        const FACILITY_COLORS = { 1: '#F05C87', 2: '#3D87F5', 4: '#69696B', 8: '#38BA8C', 16: '#8766F2', 32: '#FA9E47' };
        const FACILITY_ICONS = { 1: 'woman', 2: 'man', 4: 'accessible', 8: 'family_restroom', 16: 'wc', 32: 'baby_changing_station' };

        // Fix #3: Category tags (HomeSheetView.swift:693-748)
        const CATEGORY_TAGS = {
            '車站': ['車站', '捷運', 'MRT', '火車', '高鐵', '客運', '轉運'],
            '百貨公司': ['百貨', '商場', '購物中心', 'MALL', 'mall'],
            '餐廳': ['餐廳', '麥當勞', '肯德基', '星巴克', '咖啡', 'cafe'],
            '加油站': ['加油站', '中油'],
            '公園': ['公園', 'Park', 'park'],
            '市場': ['市場', '夜市', 'Market', 'market'],
            '圖書館': ['圖書館'],
            '運動中心': ['運動中心', '體育館', '球場'],
            '停車場': ['停車場']
        };

        // ===== State =====
        let allData = [];
        let currentFilter = 'all';
        let markers = [];
        let userLat = null, userLng = null;
        let userMarker = null;
        let sheetState = 'collapsed';
        let currentSheetY = window.innerHeight; // Fix #4: pixel-based tracking
        let searchQuery = '';
        let searchDebounceTimer = null;
        let sortMode = 'distance'; // 'distance' or 'rating'

        // ===== URL Parameters =====
        const urlParams = new URLSearchParams(window.location.search);
        const paramLat = parseFloat(urlParams.get('lat'));
        const paramLng = parseFloat(urlParams.get('lng'));
        const paramZoom = parseInt(urlParams.get('zoom'));
        const initCenter = (paramLat && paramLng) ? [paramLat, paramLng] : TAIWAN;
        const initZoom = paramZoom || (paramLat ? 12 : ZOOM_DEFAULT);

        // ===== Map =====
        const map = L.map('map', {
            center: initCenter, zoom: initZoom, zoomControl: false, attributionControl: true
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OSM', maxZoom: 19
        }).addTo(map);

        // ===== Markers =====
        function getMarkerColor(d) {
            if (d.f & 4) return '#69696B';
            if (d.f & 8) return '#38BA8C';
            if (d.f & 16) return '#8766F2';
            if ((d.f & 3) === 3) return '#FA9E47';
            if (d.f & 1) return '#F05C87';
            if (d.f & 2) return '#3D87F5';
            return '#3D87F5';
        }

        function createMarkerIcon(d) {
            const color = getMarkerColor(d);
            const hasFloors = d.fl && d.fl.length > 1;
            const iconName = hasFloors ? 'apartment' : 'wc';
            return L.divIcon({
                className: '',
                html: '<div class="toilet-marker" style="background:' + color + '"><span>' + iconName + '</span></div>',
                iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
            });
        }

        // Marker cluster group
        const clusterGroup = L.markerClusterGroup({
            maxClusterRadius: 50,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            disableClusteringAtZoom: 17,
            chunkedLoading: true
        });
        map.addLayer(clusterGroup);

        // ===== Data loading =====
        fetch('../../assets/findtoilet/toilets.json')
            .then(r => r.json())
            .then(data => {
                allData = data;
                setTimeout(() => {
                    const el = document.getElementById('loading');
                    el.classList.add('fade-out');
                    setTimeout(() => el.style.display = 'none', 300);
                }, 400);
                renderMarkers();
                geolocate();
                setSheetState('collapsed');
            })
            .catch(() => {
                document.querySelector('.loading-text').textContent = '載入失敗，請重新整理';
            });

        // ===== Filtering =====
        function matchesCategory(d, catName) {
            const keywords = CATEGORY_TAGS[catName];
            if (!keywords) return false;
            const searchStr = (d.n + ' ' + (d.a || '') + ' ' + (d.c || '')).toLowerCase();
            return keywords.some(kw => searchStr.includes(kw.toLowerCase()));
        }

        function filterData(data) {
            if (currentFilter === 'all') return data;
            if (currentFilter.startsWith('cat:')) {
                const catName = currentFilter.substring(4);
                return data.filter(d => matchesCategory(d, catName));
            }
            switch (currentFilter) {
                case 'accessible': return data.filter(d => d.f & 4);
                case 'family': return data.filter(d => d.f & 8);
                case 'diaper': return data.filter(d => d.f & 32);
                case 'gender': return data.filter(d => d.f & 16);
                case 'premium': return data.filter(d => d.g === 1);
                default: return data;
            }
        }

        document.getElementById('filterBar').addEventListener('click', e => {
            const chip = e.target.closest('.filter-chip');
            if (!chip) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentFilter = chip.dataset.filter;
            rebuildMarkers();
            renderNearbyList();
        });

        // ===== Render markers =====
        let markersLoaded = false;

        function renderMarkers() {
            if (markersLoaded) return; // Only build once, cluster handles the rest
            markersLoaded = true;

            const filtered = filterData(allData);
            clusterGroup.clearLayers();

            filtered.forEach(d => {
                const m = L.marker([d.lt, d.lg], { icon: createMarkerIcon(d) });
                m._toiletData = d;
                m.on('click', () => showDetail(d));
                clusterGroup.addLayer(m);
            });
        }

        function rebuildMarkers() {
            markersLoaded = false;
            renderMarkers();
        }

        map.on('moveend', () => { renderNearbyList(); });

        // ===== Distance helpers =====
        function distSq(d, lat, lng) { return (d.lt - lat) ** 2 + (d.lg - lng) ** 2; }

        function calcDist(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDist(meters) {
            if (meters < 1000) return Math.round(meters) + 'm';
            return (meters / 1000).toFixed(1) + 'km';
        }

        function distClass(meters) {
            if (meters <= 200) return 'dist-green';
            if (meters <= 500) return 'dist-orange';
            if (meters <= 1000) return 'dist-red';
            return 'dist-gray';
        }

        // Fix #5: Match app's walking time algorithm (LocationDetailView.swift:286-324)
        function walkTime(meters) {
            const roadDist = meters * 1.3;
            let speedKmh;
            if (roadDist < 200) speedKmh = 4.0;
            else if (roadDist < 500) speedKmh = 4.5;
            else if (roadDist < 1000) speedKmh = 5.0;
            else speedKmh = 5.5;
            const speedMs = speedKmh * 1000 / 3600;
            const walkSec = roadDist / speedMs;
            const bufferMin = Math.max(1, roadDist / 1000);
            const totalSec = walkSec + bufferMin * 60;
            const minutes = Math.max(1, Math.ceil(totalSec / 60));
            if (minutes < 60) return minutes + '分鐘';
            const hours = Math.floor(minutes / 60);
            const rem = minutes % 60;
            return rem === 0 ? hours + '小時' : hours + '小時' + rem + '分鐘';
        }

        // Stars as text badge
        function starsHtml(grade, size) {
            const count = GRADE_STARS[grade] || 1;
            const cls = size === 'lg' ? 'star-badge-lg' : 'star-badge';
            return '<span class="' + cls + '">' + count + '星級</span>';
        }

        // ===== Search =====
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');

        function performSearch(query) {
            searchQuery = query.trim().toLowerCase();
            if (!searchQuery) {
                renderNearbyList();
                return;
            }
            const cLat = userLat || map.getCenter().lat;
            const cLng = userLng || map.getCenter().lng;

            let results = allData.filter(d => {
                const str = (d.n + ' ' + (d.a || '') + ' ' + (d.c || '')).toLowerCase();
                return str.includes(searchQuery);
            });
            results.sort((a, b) => distSq(a, cLat, cLng) - distSq(b, cLat, cLng));
            results = results.slice(0, 20);
            renderListItems(results, cLat, cLng);
        }

        searchInput.addEventListener('input', () => {
            const val = searchInput.value;
            searchClear.style.display = val ? 'block' : 'none';
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => performSearch(val), 500);
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.style.display = 'none';
            searchQuery = '';
            renderNearbyList();
        });

        // ===== Nearby list =====
        function renderNearbyList() {
            if (searchQuery) { performSearch(searchQuery); return; }
            const cLat = userLat || map.getCenter().lat;
            const cLng = userLng || map.getCenter().lng;
            let nearby = filterData([...allData]);
            if (sortMode === 'rating') {
                // Sort by grade (1=best), then by distance
                nearby.sort((a, b) => {
                    const ga = a.g || 99, gb = b.g || 99;
                    if (ga !== gb) return ga - gb;
                    return distSq(a, cLat, cLng) - distSq(b, cLat, cLng);
                });
            } else {
                nearby.sort((a, b) => distSq(a, cLat, cLng) - distSq(b, cLat, cLng));
            }
            nearby = nearby.slice(0, 20);
            renderListItems(nearby, cLat, cLng);
        }

        function renderListItems(items, cLat, cLng) {
            const list = document.getElementById('nearbyList');
            list.innerHTML = items.map((d, idx) => {
                // Ad slot after every 5th item
                const adSlot = (idx > 0 && idx % 5 === 0) ? '<div class="ad-slot-list" id="listAd' + idx + '"></div>' : '';
                const dist = calcDist(cLat, cLng, d.lt, d.lg);
                const color = getMarkerColor(d);
                const hasFloors = d.fl && d.fl.length > 1;
                const iconName = hasFloors ? 'apartment' : 'wc';
                const iconColor = hasFloors ? 'var(--orange)' : 'var(--blue)';
                const iconBg = hasFloors ? 'rgba(250,158,71,0.15)' : 'rgba(61,135,245,0.15)';
                const tc = d.tc || 1;
                const tcBadge = tc > 1 ? ' <span style="font-size:0.65rem;color:var(--blue);font-weight:600">' + tc + '間</span>' : '';
                const floorBadge = hasFloors ? ' <span style="font-size:0.65rem;color:var(--orange);font-weight:600"><span class="mi" style="font-size:11px;vertical-align:-1px">apartment</span>' + d.fl.length + '層</span>' : '';
                return adSlot + '<div class="list-item" data-lat="' + d.lt + '" data-lng="' + d.lg + '">' +
                    '<div class="list-icon" style="background:' + iconBg + '">' +
                        '<span class="mi" style="color:' + iconColor + '">' + iconName + '</span>' +
                    '</div>' +
                    '<div class="list-content">' +
                        '<div class="list-name">' + d.n + '</div>' +
                        '<div class="list-stars">' + starsHtml(d.g) + tcBadge + floorBadge + '</div>' +
                    '</div>' +
                    '<div class="list-right">' +
                        '<span class="distance-badge ' + distClass(dist) + '">' + formatDist(dist) + '</span>' +
                        '<span class="mi mi-xs list-chevron" style="color:#C7C7CC">chevron_right</span>' +
                    '</div>' +
                '</div>';
            }).join('');

            list.querySelectorAll('.list-item').forEach((el, i) => {
                el.addEventListener('click', () => {
                    const d = items[i];
                    map.setView([d.lt, d.lg], Math.max(map.getZoom(), 16));
                    showDetail(d);
                });
            });

            // Initialize in-list ads
            list.querySelectorAll('.ad-slot-list').forEach(el => {
                if (el.querySelector('.adsbygoogle')) return;
                el.innerHTML = '<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9616816354780961" data-ad-slot="LIST_SLOT_ID" data-ad-format="fluid" data-ad-layout-key="-6t+ed+2i-1n-4w"></ins>';
                try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
            });
        }

        // ===== Detail sheet =====
        function showDetail(d) {
            const sheet = document.getElementById('detailSheet');
            document.getElementById('detailName').textContent = d.n;
            var starsBadges = starsHtml(d.g, 'lg');
            var tc = d.tc || 1;
            if (tc > 1) starsBadges += '<span class="detail-badge badge-tc"><span class="mi">wc</span>' + tc + '間</span>';
            var flc = d.fl ? d.fl.length : 0;
            if (flc > 1) starsBadges += '<span class="detail-badge badge-fl"><span class="mi">apartment</span>' + flc + '層</span>';
            document.getElementById('detailStars').innerHTML = starsBadges;

            if (userLat) {
                const dist = calcDist(userLat, userLng, d.lt, d.lg);
                document.getElementById('detailDist').textContent = walkTime(dist);
            } else {
                document.getElementById('detailDist').textContent = '導航';
            }
            document.getElementById('detailNav').href =
                'https://www.google.com/maps/dir/?api=1&destination=' + d.lt + ',' + d.lg + '&travelmode=walking';

            // Floor tabs
            const floorSection = document.getElementById('floorSection');
            const floorTabs = document.getElementById('floorTabs');
            if (d.fl && d.fl.length > 1) {
                floorSection.style.display = 'block';
                floorTabs.innerHTML = d.fl.map((fl, i) =>
                    '<button class="floor-tab' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' + fl.fn + '</button>'
                ).join('');
                floorTabs.onclick = function(e) {
                    const btn = e.target.closest('.floor-tab');
                    if (!btn) return;
                    floorTabs.querySelectorAll('.floor-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderFloorTypes(d.fl[parseInt(btn.dataset.idx)].f);
                };
                renderFloorTypes(d.fl[0].f);
            } else {
                floorSection.style.display = 'none';
                renderFloorTypes(d.f);
            }

            function renderFloorTypes(flags) {
                const typeTags = document.getElementById('typeTags');
                typeTags.innerHTML = '';
                for (const [bit, label] of Object.entries(FACILITY)) {
                    if (flags & parseInt(bit)) {
                        const color = FACILITY_COLORS[bit] || '#999';
                        const mi = FACILITY_ICONS[bit] || 'wc';
                        typeTags.innerHTML += '<div class="type-tag" style="background:' + color + '15;color:' + color + '"><span class="mi mi-sm" style="font-size:16px">' + mi + '</span>' + label + '</div>';
                    }
                }
                document.getElementById('typeSection').style.display = typeTags.innerHTML ? 'block' : 'none';
            }

            // Info grid
            const grid = document.getElementById('infoGrid');
            let rows = '';
            if (d.a) rows += '<div class="info-row"><div class="info-label">地址</div><div class="info-value">' + d.a + '</div></div>';
            if (d.c) rows += '<div class="info-row"><div class="info-label">場所類型</div><div class="info-value">' + d.c + '</div></div>';
            if (d.g && GRADE_MAP[d.g]) rows += '<div class="info-row"><div class="info-label">評等</div><div class="info-value">' + GRADE_MAP[d.g] + '</div></div>';
            rows += '<div class="info-row"><div class="info-label">尿布台</div><div class="info-value">' + (d.f & 32 ? '✓ 有' : '✗ 無') + '</div></div>';
            grid.innerHTML = rows;

            setDetailState('medium');
            setSheetState('collapsed');

            // Push detail ad
            try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
        }

        document.getElementById('detailBack').addEventListener('click', () => {
            setDetailState('hidden');
            setSheetState('medium');
        });

        // ===== Fix #4: Bottom sheet drag (pixel-based) =====
        const sheetHeights = {
            collapsed: 200,
            medium: Math.round(window.innerHeight * 0.42),
            expanded: Math.round(window.innerHeight * 0.85)
        };

        function setSheetState(state) {
            sheetState = state;
            const sheet = document.getElementById('bottomSheet');
            const h = sheetHeights[state];
            currentSheetY = window.innerHeight - h;
            sheet.style.transform = 'translateY(' + currentSheetY + 'px)';
            syncFilterBar(currentSheetY);
            document.getElementById('sheetOverlay').classList.toggle('visible', state === 'expanded');
            if (state === 'collapsed') map.invalidateSize();

            renderNearbyList();
        }

        function syncFilterBar(sheetY) {
            var fb = document.getElementById('filterBar');
            var fbH = fb.offsetHeight || 40;
            var top = Math.max(0, sheetY - fbH);
            fb.style.transform = 'translateY(' + top + 'px)';
        }


        // Touch drag
        let startY = 0, startTranslate = 0, isDragging = false;
        const sheetHandle = document.getElementById('sheetHandle');
        const sheetEl = document.getElementById('bottomSheet');
        const sheetScroll = document.getElementById('sheetScroll');
        const filterBarEl = document.getElementById('filterBar');

        sheetHandle.addEventListener('touchstart', function(e) {
            isDragging = true;
            startY = e.touches[0].clientY;
            startTranslate = currentSheetY;
            sheetEl.style.transition = 'none';
            filterBarEl.style.transition = 'none';
        }, { passive: true });

        let scrollDragStartY = 0, scrollDragReady = false;

        sheetScroll.addEventListener('touchstart', function(e) {
            scrollDragStartY = e.touches[0].clientY;
            scrollDragReady = true;
        }, { passive: true });

        sheetScroll.addEventListener('touchmove', function(e) {
            if (!scrollDragReady || isDragging) return;
            var dy = e.touches[0].clientY - scrollDragStartY;
            if (dy > 8 && sheetScroll.scrollTop <= 0) {
                isDragging = true; startY = e.touches[0].clientY; startTranslate = currentSheetY;
                sheetEl.style.transition = 'none'; filterBarEl.style.transition = 'none';
                scrollDragReady = false; e.preventDefault();
            } else if (dy < -8 && sheetState !== 'expanded') {
                isDragging = true; startY = e.touches[0].clientY; startTranslate = currentSheetY;
                sheetEl.style.transition = 'none'; filterBarEl.style.transition = 'none';
                scrollDragReady = false; e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            var newY = Math.max(window.innerHeight - sheetHeights.expanded, startTranslate + (e.touches[0].clientY - startY));
            currentSheetY = newY;
            sheetEl.style.transform = 'translateY(' + newY + 'px)';
            syncFilterBar(newY);
        }, { passive: true });

        document.addEventListener('touchend', function() {
            if (!isDragging) return;
            isDragging = false; scrollDragReady = false;
            sheetEl.style.transition = ''; filterBarEl.style.transition = '';
            var visibleH = window.innerHeight - currentSheetY;
            if (visibleH > sheetHeights.medium + 80) setSheetState('expanded');
            else if (visibleH > sheetHeights.collapsed + 40) setSheetState('medium');
            else setSheetState('collapsed');
        });

        // Click handle to toggle
        sheetHandle.addEventListener('click', function() {
            if (sheetState === 'collapsed') setSheetState('medium');
            else if (sheetState === 'medium') setSheetState('expanded');
            else setSheetState('collapsed');
        });

        // Resize handler
        window.addEventListener('resize', function() {
            sheetHeights.medium = Math.round(window.innerHeight * 0.42);
            sheetHeights.expanded = Math.round(window.innerHeight * 0.85);
            setSheetState(sheetState);
            detailHeights.medium = Math.round(window.innerHeight * 0.45);
            detailHeights.expanded = Math.round(window.innerHeight * 0.85);
            if (detailState !== 'hidden') setDetailState(detailState);
        });

        // ===== Detail sheet drag =====
        const detailHeights = {
            medium: Math.round(window.innerHeight * 0.45),
            expanded: Math.round(window.innerHeight * 0.85)
        };
        let detailState = 'hidden';
        let currentDetailY = window.innerHeight;
        const detailEl = document.getElementById('detailSheet');
        const detailHandleArea = detailEl.querySelector('.sheet-handle-area');
        const detailScrollEl = document.getElementById('detailScroll');
        let detailDragging = false;
        let detailStartY = 0, detailStartTranslate = 0;
        let detailScrollDragStartY = 0, detailScrollDragReady = false;

        function setDetailState(state) {
            detailState = state;
            if (state === 'hidden') {
                currentDetailY = window.innerHeight;
            } else {
                const h = detailHeights[state] || detailHeights.medium;
                currentDetailY = window.innerHeight - h;
            }
            detailEl.style.transform = 'translateY(' + currentDetailY + 'px)';
            document.getElementById('detailOverlay').classList.toggle('visible', state === 'expanded');
        }

        setDetailState('hidden');

        detailHandleArea.addEventListener('touchstart', function(e) {
            detailDragging = true; detailStartY = e.touches[0].clientY;
            detailStartTranslate = currentDetailY; detailEl.style.transition = 'none';
        }, { passive: true });

        detailScrollEl.addEventListener('touchstart', function(e) {
            detailScrollDragStartY = e.touches[0].clientY; detailScrollDragReady = true;
        }, { passive: true });

        detailScrollEl.addEventListener('touchmove', function(e) {
            if (!detailScrollDragReady || detailDragging) return;
            var dy = e.touches[0].clientY - detailScrollDragStartY;
            if (dy > 8 && detailScrollEl.scrollTop <= 0) {
                detailDragging = true; detailStartY = e.touches[0].clientY;
                detailStartTranslate = currentDetailY; detailEl.style.transition = 'none';
                detailScrollDragReady = false; e.preventDefault();
            } else if (dy < -8 && detailState !== 'expanded') {
                detailDragging = true; detailStartY = e.touches[0].clientY;
                detailStartTranslate = currentDetailY; detailEl.style.transition = 'none';
                detailScrollDragReady = false; e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (!detailDragging) return;
            var newY = Math.max(window.innerHeight - detailHeights.expanded, detailStartTranslate + (e.touches[0].clientY - detailStartY));
            currentDetailY = newY;
            detailEl.style.transform = 'translateY(' + newY + 'px)';
        }, { passive: true });

        document.addEventListener('touchend', function() {
            if (!detailDragging) return;
            detailDragging = false; detailScrollDragReady = false; detailEl.style.transition = '';
            var visibleH = window.innerHeight - currentDetailY;
            if (visibleH < 100) { setDetailState('hidden'); setSheetState('medium'); }
            else if (visibleH > detailHeights.medium + 60) setDetailState('expanded');
            else setDetailState('medium');
        });

        // Detail handle click toggle
        detailHandleArea.addEventListener('click', function() {
            if (detailState === 'medium') setDetailState('expanded');
            else if (detailState === 'expanded') setDetailState('medium');
        });

        // ===== Geolocation =====
        function geolocate() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(function(pos) {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;

                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([userLat, userLng], {
                    icon: L.divIcon({
                        className: '',
                        html: '<div style="position:relative"><div class="user-pulse"></div><div class="user-dot"></div></div>',
                        iconSize: [18, 18], iconAnchor: [9, 9]
                    }),
                    zIndexOffset: 1000
                }).addTo(map);

                map.setView([userLat, userLng], ZOOM_LOCATED);
                setSheetState('medium');
            }, function() {}, { enableHighAccuracy: true, timeout: 8000 });
        }

        document.getElementById('locateBtn').addEventListener('click', geolocate);
        document.getElementById('zoomInBtn').addEventListener('click', function() { map.zoomIn(); });
        document.getElementById('zoomOutBtn').addEventListener('click', function() { map.zoomOut(); });

        // ===== Info / About =====
        document.getElementById('sheetOverlay').addEventListener('click', function() {
            setSheetState('medium');
        });
        document.getElementById('detailOverlay').addEventListener('click', function() {
            setDetailState('hidden');
            setSheetState('medium');
        });

        function goToAbout() { window.open('../', '_self'); }
        document.getElementById('infoBtn').addEventListener('click', goToAbout);
        document.getElementById('aboutBtn').addEventListener('click', goToAbout);

        // Sort toggle
        document.getElementById('sortBtn').addEventListener('click', function() {
            sortMode = sortMode === 'distance' ? 'rating' : 'distance';
            this.innerHTML = sortMode === 'distance'
                ? '<span class="mi" style="font-size:14px">sort</span> 距離'
                : '<span class="mi" style="font-size:14px">star</span> 評等';
            renderNearbyList();
        });

        // Banner is always visible, no close logic needed

        // Close detail on map click
        map.on('click', function() {
            if (detailState !== 'hidden') {
                setDetailState('hidden');
                setSheetState('medium');
            }
        });

    })();
    </script>

</body>
</html>
